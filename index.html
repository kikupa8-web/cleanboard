<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanBoard - 清掃管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--surface:#fff;--surface2:#f0f0f0;--text:#1a1a1a;--text2:#666;
  --border:#e0e0e0;--primary:#1D9E75;--primary-light:#e6f7f1;--danger:#d85a30;
  --shadow:0 1px 3px rgba(0,0,0,.08);--radius:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2a;--text:#e0e0e0;--text2:#999;
    --border:#333;--primary-light:#1a3a2e;--shadow:0 1px 3px rgba(0,0,0,.3);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:.875rem;border:none;border-radius:var(--radius);padding:.5rem 1rem;transition:opacity .15s}
button:hover{opacity:.85}
input,select,textarea{font-family:inherit;font-size:.875rem;border:1px solid var(--border);border-radius:var(--radius);padding:.5rem .75rem;background:var(--surface);color:var(--text);width:100%}
textarea{resize:vertical;min-height:60px}

.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;height:52px;gap:.5rem;position:sticky;top:0;z-index:100}
.navbar h1{font-size:1.1rem;font-weight:700;color:var(--primary);margin-right:1.5rem;white-space:nowrap}
.nav-tabs{display:flex;gap:2px;overflow-x:auto}
.nav-tab{padding:.5rem .85rem;border-radius:var(--radius);background:transparent;color:var(--text2);font-weight:500;white-space:nowrap}
.nav-tab.active{background:var(--primary);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.btn-add{background:var(--primary);color:#fff;display:flex;align-items:center;gap:.35rem;font-weight:600;padding:.45rem .9rem}
.conn-indicator{font-size:.75rem;padding:.25rem .5rem;border-radius:99px;display:flex;align-items:center;gap:.3rem}
.conn-indicator.online{background:#d4edda;color:#155724}
.conn-indicator.offline{background:#f8d7da;color:#721c24}
@media(prefers-color-scheme:dark){
  .conn-indicator.online{background:#1a3a2e;color:#6dd49e}
  .conn-indicator.offline{background:#3a1a1a;color:#e06060}
}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);padding:1rem;overflow-y:auto;flex-shrink:0}
.sidebar h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:.5rem;margin-top:1rem}
.sidebar h3:first-child{margin-top:0}
.filter-item{display:flex;align-items:center;gap:.5rem;padding:.35rem .5rem;border-radius:var(--radius);cursor:pointer;font-size:.875rem}
.filter-item:hover{background:var(--surface2)}
.filter-item.active{background:var(--primary-light);font-weight:600}
.filter-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.staff-item{padding:.35rem .5rem;font-size:.875rem;color:var(--text2)}
.progress-section{margin-top:1.5rem}
.progress-bar-bg{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:.35rem}
.progress-bar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .3s}
.progress-label{font-size:.75rem;color:var(--text2);margin-top:.25rem}

.content{flex:1;padding:1.5rem;overflow-y:auto}
.tab-content{display:none}
.tab-content.active{display:block}

.cal-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.cal-header h2{font-size:1.25rem;font-weight:700;min-width:170px;letter-spacing:.02em}
.cal-btn{background:var(--surface2);color:var(--text);padding:.45rem .85rem;font-size:.82rem;font-weight:500;transition:background .15s}
.cal-btn:hover{background:var(--border)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-dow{background:var(--surface2);text-align:center;font-size:.72rem;font-weight:700;padding:.5rem .2rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--border)}
.cal-dow.weekend{color:var(--danger);opacity:.7}
.cal-day{background:var(--surface);min-height:105px;padding:.4rem;font-size:.75rem;vertical-align:top;border:.5px solid var(--border);transition:background .1s;position:relative}
.cal-day:hover{background:var(--surface2)}
.cal-day.other{opacity:.3;background:var(--bg)}
.cal-day.other:hover{opacity:.4}
.cal-day.today{background:var(--primary-light);box-shadow:inset 0 0 0 2px var(--primary)}
.cal-day.weekend{background:color-mix(in srgb,var(--surface) 92%,var(--danger))}
.cal-day.weekend.today{background:var(--primary-light);box-shadow:inset 0 0 0 2px var(--primary)}
.cal-day-num{font-weight:700;font-size:.82rem;margin-bottom:.35rem;display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:50%}
.cal-day.today .cal-day-num{background:var(--primary);color:#fff}
.cal-chip{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:.68rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:transform .1s,box-shadow .1s;line-height:1.4}
.cal-chip:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(0,0,0,.1);opacity:1}
.cal-chip i{font-size:.72rem;flex-shrink:0}
.cal-chip.airbnb{font-weight:600}
.cal-chip.airbnb-checkin{background:#e0f5f2!important;color:#00796b!important;border-left:3px solid #00A699}
.cal-chip.airbnb-checkout{background:#fde8e8!important;color:#c0392b!important;border-left:3px solid #FF5A5F}
.cal-chip.airbnb-stay{background:var(--surface2)!important;color:var(--text2)!important;border-left:3px solid #bbb;opacity:.6;font-weight:400}
.cal-chip.task-chip{border-left:3px solid currentColor}
@media(prefers-color-scheme:dark){
  .cal-chip.airbnb-checkin{background:#0d3b33!important;color:#4dd0c0!important}
  .cal-chip.airbnb-checkout{background:#3b1515!important;color:#f07070!important}
  .cal-chip.airbnb-stay{background:#2a2a2a!important;color:#888!important;border-left-color:#555}
  .cal-day.weekend{background:color-mix(in srgb,var(--surface) 90%,#d85a30)}
}
.airbnb-legend{display:flex;gap:1.2rem;margin-bottom:.75rem;flex-wrap:wrap;font-size:.78rem;color:var(--text2);padding:.5rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.airbnb-legend span{display:flex;align-items:center;gap:.4rem}
.airbnb-legend i{font-size:1rem}
.legend-dot{width:12px;height:4px;border-radius:2px;flex-shrink:0}
.sync-btn{background:var(--surface2);color:var(--text);padding:.45rem .85rem;font-size:.82rem;display:flex;align-items:center;gap:.4rem;font-weight:500}
.sync-btn:hover{background:var(--border)}
.sync-btn.syncing{opacity:.5;pointer-events:none}
.ical-input{font-size:.78rem;padding:.35rem .5rem}

.task-filters{display:flex;gap:.35rem;margin-bottom:1rem}
.task-filter{padding:.35rem .7rem;border-radius:99px;background:var(--surface2);color:var(--text2);font-size:.8rem}
.task-filter.active{background:var(--primary);color:#fff}
.task-list{display:flex;flex-direction:column;gap:.5rem}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;display:flex;align-items:flex-start;gap:.75rem;box-shadow:var(--shadow)}
.task-card.done{opacity:.55}
.task-check{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.task-check.checked{background:var(--primary);border-color:var(--primary);color:#fff}
.task-info{flex:1;min-width:0}
.task-prop{font-weight:600;font-size:.9rem}
.task-meta{font-size:.78rem;color:var(--text2);margin-top:.15rem}
.task-note{font-size:.78rem;color:var(--text2);margin-top:.25rem;font-style:italic}
.task-delete{background:transparent;color:var(--text2);padding:.3rem;font-size:1rem}
.task-delete:hover{color:var(--danger)}
.task-prop-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.35rem;vertical-align:middle}

.cl-select{max-width:300px;margin-bottom:1rem}
.cl-room{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.cl-room-header{padding:.6rem .85rem;font-weight:600;font-size:.9rem;background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.cl-room-progress{font-size:.75rem;color:var(--text2);font-weight:400}
.cl-items{padding:.5rem .85rem}
.cl-item{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;font-size:.875rem;cursor:pointer}
.cl-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary)}
.cl-progress-all{margin-top:.5rem}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:var(--shadow)}
.stat-value{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-label{font-size:.78rem;color:var(--text2);margin-top:.2rem}
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.chart-section h3{font-size:.9rem;margin-bottom:.75rem}
.bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;font-size:.8rem}
.bar-name{width:80px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .3s;display:flex;align-items:center;padding-left:6px;font-size:.7rem;color:#fff;font-weight:600;min-width:fit-content}
.bar-count{width:30px;flex-shrink:0;text-align:center;font-weight:600}

.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.settings-section h3{font-size:.95rem;margin-bottom:.75rem}
.setting-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;font-size:.875rem}
.setting-row .filter-dot{flex-shrink:0}
.setting-row span{flex:1}
.btn-sm{padding:.3rem .6rem;font-size:.78rem;border-radius:var(--radius)}
.btn-danger{background:var(--danger);color:#fff}
.btn-primary{background:var(--primary);color:#fff}
.add-row{display:flex;gap:.5rem;margin-top:.5rem}
.add-row input{flex:1}
.color-input{width:50px!important;padding:2px!important;height:34px;cursor:pointer}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:1.5rem;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal h2{font-size:1.1rem;margin-bottom:1rem}
.modal-field{margin-bottom:.85rem}
.modal-field label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:.3rem}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.2rem}
.btn-cancel{background:var(--surface2);color:var(--text)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2)}

.co-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 8px;margin-bottom:3px;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s,box-shadow .15s;font-size:.68rem;border-left:3px solid #FF5A5F}
.co-card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.12)}
.co-card-header{display:flex;align-items:center;gap:4px;font-weight:700;color:#c0392b;margin-bottom:3px}
.co-card-header i{font-size:.75rem}
.co-card-row{display:flex;align-items:center;gap:4px;color:var(--text2);margin-bottom:1px;font-size:.63rem}
.co-card-row i{font-size:.68rem;flex-shrink:0;width:14px;text-align:center}
.co-card-row.next-in{color:#00796b;font-weight:600}
.co-card-guest{font-size:.65rem;color:var(--text);font-weight:500}
@media(prefers-color-scheme:dark){
  .co-card-header{color:#f07070}
  .co-card-row.next-in{color:#4dd0c0}
}

.detail-modal{max-width:480px}
.detail-header{display:flex;align-items:center;gap:.5rem;margin-bottom:1.2rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
.detail-header .prop-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border-radius:99px;font-weight:700;font-size:.9rem}
.detail-header .close-btn{margin-left:auto;background:transparent;color:var(--text2);font-size:1.3rem;padding:.2rem .5rem}
.detail-timeline{position:relative;padding-left:28px;margin-bottom:1.2rem}
.detail-timeline::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:1rem}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-22px;top:2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--surface)}
.tl-dot.checkout{border-color:#FF5A5F;background:#fde8e8}
.tl-dot.clean{border-color:var(--primary);background:var(--primary-light)}
.tl-dot.checkin{border-color:#00A699;background:#e0f5f2}
.tl-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.15rem}
.tl-label.checkout{color:#c0392b}
.tl-label.clean{color:var(--primary)}
.tl-label.checkin{color:#00796b}
.tl-value{font-size:.9rem;font-weight:600}
.tl-sub{font-size:.78rem;color:var(--text2)}
.detail-fields{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.detail-field{display:flex;flex-direction:column;gap:.25rem}
.detail-field label{font-size:.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.03em}
.detail-field input,.detail-field select{font-size:.85rem;padding:.45rem .6rem}
.detail-field.full{grid-column:1/-1}
@media(prefers-color-scheme:dark){
  .tl-dot.checkout{background:#3b1515}
  .tl-dot.checkin{background:#0d3b33}
  .tl-label.checkout{color:#f07070}
  .tl-label.checkin{color:#4dd0c0}
}

@media(max-width:768px){
  .sidebar{display:none}
  .content{padding:.75rem}
  .navbar{height:auto;flex-wrap:wrap;padding:.4rem .6rem;gap:.3rem}
  .navbar h1{font-size:.95rem;margin-right:auto}
  .nav-tabs{order:3;width:100%;overflow-x:auto;padding-top:.3rem;border-top:1px solid var(--border);margin-top:.2rem}
  .nav-tab{padding:.35rem .55rem;font-size:.72rem}
  .nav-right{order:2;gap:.3rem}
  .btn-add{padding:.35rem .6rem;font-size:.75rem}
  .conn-indicator{font-size:.65rem;padding:.2rem .4rem}
  .cal-header{flex-wrap:wrap;gap:.4rem}
  .cal-header h2{font-size:1rem;min-width:auto}
  .cal-btn{padding:.35rem .6rem;font-size:.75rem}
  .sync-btn{font-size:.72rem;padding:.3rem .5rem}
  .airbnb-legend{font-size:.65rem;gap:.5rem;padding:.35rem .5rem}
  .cal-day{min-height:65px;padding:.2rem}
  .cal-chip{font-size:.55rem;padding:1px 3px;gap:1px}
  .cal-chip i{font-size:.6rem}
  .cal-day-num{font-size:.72rem;width:20px;height:20px;line-height:20px}
  .co-card{padding:3px 5px;font-size:.58rem}
  .co-card-header{font-size:.6rem}
  .co-card-row{font-size:.52rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .modal{padding:1rem;margin:.5rem}
  .detail-fields{grid-template-columns:1fr}
  .detail-field.full{grid-column:1}
}
</style>
</head>
<body>

<nav class="navbar">
  <h1><i class="ti ti-spray"></i> CleanBoard</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="calendar"><i class="ti ti-calendar"></i> カレンダー</button>
    <button class="nav-tab" data-tab="tasks"><i class="ti ti-list-check"></i> タスク</button>
    <button class="nav-tab" data-tab="checklist"><i class="ti ti-checkbox"></i> チェックリスト</button>
    <button class="nav-tab" data-tab="stats"><i class="ti ti-chart-bar"></i> 集計</button>
    <button class="nav-tab" data-tab="settings"><i class="ti ti-settings"></i> 設定</button>
  </div>
  <div class="nav-right">
    <span id="connIndicator" class="conn-indicator offline"><i class="ti ti-wifi-off"></i> 接続中...</span>
    <button class="btn-add" id="btnAddTask"><i class="ti ti-plus"></i> タスク追加</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <h3>物件フィルター</h3>
    <div id="propFilters"></div>
    <h3>スタッフ</h3>
    <div id="staffList"></div>
    <div class="progress-section">
      <h3>今月の進捗</h3>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0 件完了</div>
    </div>
  </aside>

  <main class="content">
    <!-- Calendar -->
    <div class="tab-content active" id="tab-calendar">
      <div class="cal-header">
        <button class="cal-btn" id="calPrev"><i class="ti ti-chevron-left"></i></button>
        <h2 id="calTitle"></h2>
        <button class="cal-btn" id="calNext"><i class="ti ti-chevron-right"></i></button>
        <button class="cal-btn" id="calToday">今月</button>
        <button class="sync-btn" id="btnSync"><i class="ti ti-refresh"></i> Airbnb同期</button>
      </div>
      <div class="airbnb-legend" id="airbnbLegend" style="display:none">
        <span><span class="legend-dot" style="background:#00A699"></span> チェックイン</span>
        <span><span class="legend-dot" style="background:#FF5A5F"></span> チェックアウト（自動清掃タスク）</span>
        <span><span class="legend-dot" style="background:#bbb"></span> 宿泊中</span>
        <span><span class="legend-dot" style="background:var(--primary)"></span> 清掃タスク</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Tasks -->
    <div class="tab-content" id="tab-tasks">
      <div class="task-filters">
        <button class="task-filter active" data-filter="all">すべて</button>
        <button class="task-filter" data-filter="undone">未完了</button>
        <button class="task-filter" data-filter="done">完了済み</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>

    <!-- Checklist -->
    <div class="tab-content" id="tab-checklist">
      <select class="cl-select" id="clPropSelect"></select>
      <div id="clRooms"></div>
      <div class="cl-progress-all">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="clProgressFill" style="width:0%"></div></div>
        <div class="progress-label" id="clProgressLabel">0 / 0 項目完了</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="tab-content" id="tab-stats">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-section"><h3>スタッフ別 完了件数</h3><div id="chartStaff"></div></div>
      <div class="chart-section"><h3>物件別 タスク件数</h3><div id="chartProp"></div></div>
    </div>

    <!-- Settings -->
    <div class="tab-content" id="tab-settings">
      <div class="settings-section">
        <h3><i class="ti ti-building"></i> 物件管理</h3>
        <div id="settingsProps"></div>
        <div class="add-row">
          <input id="newPropName" placeholder="物件名">
          <input type="color" id="newPropColor" value="#1D9E75" class="color-input">
          <button class="btn-sm btn-primary" id="btnAddProp">追加</button>
        </div>
      </div>
      <div class="settings-section">
        <h3><i class="ti ti-brand-airbnb"></i> Airbnb iCal連携</h3>
        <p style="font-size:.78rem;color:var(--text2);margin-bottom:.75rem">物件ごとにAirbnbのiCalフィードURLを設定すると、予約情報がカレンダーに自動表示されます。</p>
        <div id="settingsIcal"></div>
      </div>
      <div class="settings-section">
        <h3><i class="ti ti-users"></i> スタッフ管理</h3>
        <div id="settingsStaff"></div>
        <div class="add-row">
          <input id="newStaffName" placeholder="スタッフ名">
          <button class="btn-sm btn-primary" id="btnAddStaff">追加</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2><i class="ti ti-plus"></i> タスク追加</h2>
    <div class="modal-field">
      <label>物件</label>
      <select id="modalProp"></select>

// Calendar
function renderCalendar(){
  document.getElementById('calTitle').textContent=`${calYear}年 ${calMonth+1}月`;
  const first=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  const startDow=first.getDay();
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map((d,i)=>`<div class="cal-dow${i===0||i===6?' weekend':''}">${d}</div>`).join('');
  const prevLast=new Date(calYear,calMonth,0).getDate();
  for(let i=startDow-1;i>=0;i--){
    const dow=(startDow-i)%7;
    html+=`<div class="cal-day other${dow===0||dow===6?' weekend':''}"><div class="cal-day-num">${prevLast-i}</div></div>`;
  }
  const today=new Date();
  for(let d=1;d<=lastDay;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const dayTasks=Object.values(tasks).filter(t=>t.date===dateStr&&(activePropFilter===null||t.prop===activePropFilter));
    const dow=new Date(calYear,calMonth,d).getDay();
    const isWeekend=dow===0||dow===6;
    const abEvents=(airbnbEvents[dateStr]||[]).filter(b=>activePropFilter===null||b.propId===activePropFilter);
    let chips=abEvents.map(b=>{
      const p=properties[b.propId];
      if(!p)return'';
      const guest=b.summary&&b.summary!=='Reserved'?b.summary:'';
      if(b.type==='checkout'){
        const coKey=b.propId+'_'+b.date;
        const ni=b.nextIn;
        let nextHtml='';
        if(ni){nextHtml=`<div class="co-card-row next-in"><i class="ti ti-login"></i> 次IN ${ni.date.slice(5).replace('-','/')} ${ni.nights}泊</div>`}
        return`<div class="co-card" onclick="openDetail('${esc(coKey)}','${esc(b.propId)}','${esc(b.date)}')">
          <div class="co-card-header"><i class="ti ti-logout"></i> OUT${guest?' <span class="co-card-guest">'+esc(guest)+'</span>':''}</div>
          ${nextHtml}
        </div>`;
      }
      if(b.type==='checkin'){
        return`<span class="cal-chip airbnb airbnb-checkin" title="${esc(p.name)}${guest?' - '+guest:''} (${b.nights}泊)"><i class="ti ti-login"></i> IN${guest?' '+esc(guest):''}</span>`;
      }
      return`<span class="cal-chip airbnb airbnb-stay" title="${esc(p.name)} 宿泊中"><i class="ti ti-moon-stars"></i></span>`;
    }).join('');
    chips+=dayTasks.map(t=>{
      const p=properties[t.prop];
      if(!p)return'';
      const s=staff[t.staff];
      const icon=t.done?'<i class="ti ti-circle-check"></i>':'<i class="ti ti-spray"></i>';
      const doneStyle=t.done?'opacity:.5;text-decoration:line-through':'';
      return`<span class="cal-chip task-chip" style="background:${p.bgColor||'#eee'};color:${p.color};${doneStyle}" title="${esc(p.name)} - ${s?esc(s.name):''}">${icon} ${s?esc(s.name):''}</span>`;
    }).join('');
    html+=`<div class="cal-day${isToday?' today':''}${isWeekend?' weekend':''}"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  const totalCells=startDow+lastDay;
  const rem=totalCells%7?7-totalCells%7:0;
  for(let i=1;i<=rem;i++){
    const rdow=(totalCells+i-1)%7;
    html+=`<div class="cal-day other${rdow===0||rdow===6?' weekend':''}"><div class="cal-day-num">${i}</div></div>`;

}

// Airbnb iCal
function parseICal(text){
  const events=[];
  const blocks=text.split('BEGIN:VEVENT');
  for(let i=1;i<blocks.length;i++){
    const b=blocks[i].split('END:VEVENT')[0];
    const get=k=>{const m=b.match(new RegExp(k+':(.+)'));return m?m[1].trim():''};
    const dtstart=get('DTSTART;VALUE=DATE')||get('DTSTART');
    const dtend=get('DTEND;VALUE=DATE')||get('DTEND');
    const summary=get('SUMMARY');
    const desc=get('DESCRIPTION');
    if(dtstart&&dtend){
      const start=dtstart.replace(/(\d{4})(\d{2})(\d{2}).*/,'$1-$2-$3');
      const end=dtend.replace(/(\d{4})(\d{2})(\d{2}).*/,'$1-$2-$3');
      events.push({start,end,summary,desc});
    }
  }
  return events;
}

function expandBookings(events,propId){
  const sorted=events.filter(ev=>ev.summary!=='Not available'&&ev.summary!=='Airbnb (Not available)').sort((a,b)=>a.start.localeCompare(b.start));
  const result=[];
  for(let ei=0;ei<sorted.length;ei++){
    const ev=sorted[ei];
    const s=new Date(ev.start),e=new Date(ev.end);
    const nights=Math.round((e-s)/(86400000));
    const nextEv=sorted[ei+1]||null;
    const nextIn=nextEv?{date:nextEv.start,summary:nextEv.summary,nights:Math.round((new Date(nextEv.end)-new Date(nextEv.start))/86400000)}:null;
    result.push({date:ev.start,type:'checkin',propId,summary:ev.summary,desc:ev.desc,nights});
    for(let d=1;d<nights;d++){
      const cur=new Date(s);cur.setDate(cur.getDate()+d);
      const dateStr=cur.toISOString().slice(0,10);
      result.push({date:dateStr,type:'stay',propId,summary:ev.summary,desc:ev.desc,nights});
    }
    result.push({date:ev.end,type:'checkout',propId,summary:ev.summary,desc:ev.desc,nights,nextIn});
  }
  return result;
}

  const btn=document.getElementById('btnSync');
  btn.classList.add('syncing');
  btn.innerHTML='<i class="ti ti-refresh"></i> 同期中...';
  airbnbEvents={};
  let hasIcal=false;
  for(const[id,p] of Object.entries(properties)){
    if(!p.icalUrl)continue;
    hasIcal=true;
    try{
      const resp=await fetch(ICAL_PROXY+'?url='+encodeURIComponent(p.icalUrl));
      if(!resp.ok)continue;
      const text=await resp.text();
      const events=parseICal(text);
      const bookings=expandBookings(events,id);
      for(const b of bookings){
        if(!airbnbEvents[b.date])airbnbEvents[b.date]=[];
        airbnbEvents[b.date].push(b);
      }
    }catch(e){console.error('iCal sync error for '+p.name,e)}
  }
  if(hasIcal){
    document.getElementById('airbnbLegend').style.display='flex';
    await autoCreateCheckoutTasks();
  }
  btn.classList.remove('syncing');
  btn.innerHTML='<i class="ti ti-refresh"></i> Airbnb同期';
  renderCalendar();
  renderTasks();
}

async function autoCreateCheckoutTasks(){
  const existingTasks=Object.values(tasks);
  const staffIds=Object.keys(staff);
  if(!staffIds.length)return;
  let created=0;
  for(const[date,evts] of Object.entries(airbnbEvents)){
    const checkouts=evts.filter(e=>e.type==='checkout');
    for(const co of checkouts){
      const already=existingTasks.some(t=>t.prop===co.propId&&t.date===date&&t.source==='airbnb');
      if(already)continue;
      const assignee=staffIds[created%staffIds.length];
      const guest=co.summary&&co.summary!=='Reserved'?co.summary:'';
      await db.ref('tasks').push({
        prop:co.propId,
        date:date,
        staff:assignee,
        note:'チェックアウト清掃'+(guest?' ('+guest+')':''),
        done:false,
        source:'airbnb',
        createdAt:Date.now()
      });
      created++;
    }
  }
  if(created>0){
    const tSnap=await db.ref('tasks').once('value');
    tasks=tSnap.val()||{};
  }
}

document.getElementById('btnSync').onclick=syncAirbnb;

// Settings: iCal URLs
function renderSettingsIcal(){
  const el=document.getElementById('settingsIcal');
  if(!el)return;
  el.innerHTML=Object.entries(properties).map(([id,p])=>`<div class="setting-row" style="flex-wrap:wrap">
    <span class="filter-dot" style="background:${p.color}"></span>
    <span style="min-width:80px">${esc(p.name)}</span>
    <input class="ical-input" style="flex:1;min-width:200px" placeholder="iCal URL (https://www.airbnb.jp/calendar/ical/...)" value="${p.icalUrl?esc(p.icalUrl):''}" onchange="saveIcalUrl('${id}',this.value)">
  </div>`).join('');
}

function saveIcalUrl(propId,url){db.ref('properties/'+propId+'/icalUrl').set(url.trim())}

// Detail Modal
let currentDetailKey=null;
let cleaningDetails={};

db.ref('cleaningDetails').on('value',snap=>{cleaningDetails=snap.val()||{}});

function openDetail(key,propId,date){
  currentDetailKey=key;
  const p=properties[propId];
  if(!p)return;
  const badge=document.getElementById('detailPropBadge');
  badge.innerHTML=`<span class="filter-dot" style="background:${p.color}"></span> ${esc(p.name)}`;
  badge.style.background=p.bgColor||'#eee';badge.style.color=p.color;

  const allEvts=[];
  for(const evts of Object.values(airbnbEvents)){for(const e of evts){if(e.propId===propId&&e.date===date&&e.type==='checkout')allEvts.push(e)}}
  const co=allEvts[0];
  let tlHtml='';
  if(co){
    const guest=co.summary&&co.summary!=='Reserved'?co.summary:'ゲスト';
    tlHtml+=`<div class="tl-item"><div class="tl-dot checkout"></div><div class="tl-label checkout">チェックアウト</div><div class="tl-value">${date.slice(5).replace('-','/')} 11:00</div><div class="tl-sub">${esc(guest)} · ${co.nights}泊</div></div>`;
    tlHtml+=`<div class="tl-item"><div class="tl-dot clean"></div><div class="tl-label clean">清掃</div><div class="tl-value">${date.slice(5).replace('-','/')} <span id="tlCleanTime">11:00</span></div><div class="tl-sub" id="tlCleanStaff">担当未定</div></div>`;
    if(co.nextIn){
      tlHtml+=`<div class="tl-item"><div class="tl-dot checkin"></div><div class="tl-label checkin">次のチェックイン</div><div class="tl-value">${co.nextIn.date.slice(5).replace('-','/')} 16:00</div><div class="tl-sub">${co.nextIn.summary&&co.nextIn.summary!=='Reserved'?esc(co.nextIn.summary):'ゲスト'} · ${co.nextIn.nights}泊</div></div>`;
    }
  }
  document.getElementById('detailTimeline').innerHTML=tlHtml;

  const staffSel=document.getElementById('detailStaff');
  staffSel.innerHTML='<option value="">未割当</option>'+Object.entries(staff).map(([id,s])=>`<option value="${id}">${esc(s.name)}</option>`).join('');

  const saved=cleaningDetails[key]||{};
  const prop=properties[propId]||{};
  document.getElementById('detailGuests').value=saved.guests||'';
  staffSel.value=saved.staff||'';
  document.getElementById('detailCleanTime').value=saved.cleanTime||'11:00';
  document.getElementById('detailEntry').value=saved.entry||prop.entry||'';
  document.getElementById('detailAddress').value=saved.address||prop.address||'';
  document.getElementById('detailPhotoUrl').value=saved.photoUrl||prop.photoUrl||'';
  document.getElementById('detailNote').value=saved.note||'';

  document.getElementById('detailOverlay').classList.add('show');
}

document.getElementById('detailClose').onclick=()=>document.getElementById('detailOverlay').classList.remove('show');
document.getElementById('detailCancel').onclick=()=>document.getElementById('detailOverlay').classList.remove('show');
document.getElementById('detailOverlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')};

document.getElementById('detailSave').onclick=()=>{
  if(!currentDetailKey)return;
  const data={
    guests:parseInt(document.getElementById('detailGuests').value)||null,
    staff:document.getElementById('detailStaff').value||null,
    cleanTime:document.getElementById('detailCleanTime').value||'11:00',
    entry:document.getElementById('detailEntry').value.trim(),
    address:document.getElementById('detailAddress').value.trim(),
    photoUrl:document.getElementById('detailPhotoUrl').value.trim(),
    note:document.getElementById('detailNote').value.trim(),
    updatedAt:Date.now()
  };
  db.ref('cleaningDetails/'+currentDetailKey).set(data);
  const parts=currentDetailKey.split('_');
  const propId=parts[0],date=parts.slice(1).join('_');
  if(data.entry)db.ref('properties/'+propId+'/entry').set(data.entry);
  if(data.address)db.ref('properties/'+propId+'/address').set(data.address);
  if(data.photoUrl)db.ref('properties/'+propId+'/photoUrl').set(data.photoUrl);
  if(data.staff){
    const existingTask=Object.entries(tasks).find(([,t])=>t.prop===propId&&t.date===date&&t.source==='airbnb');
    if(existingTask){db.ref('tasks/'+existingTask[0]+'/staff').set(data.staff);db.ref('tasks/'+existingTask[0]+'/note').set('チェックアウト清掃'+(data.note?' - '+data.note:''))}
  }
  document.getElementById('detailOverlay').classList.remove('show');
  render();
};

// Boot
async function boot(){
  await initDefaults();
  const pSnap=await db.ref('properties').once('value');
  const props=pSnap.val()||{};
  for(const[id,p] of Object.entries(props)){
    if(p.name==='桜ハウス'||p.name==='高知東'){
      await db.ref('properties/'+id).remove();
      const tSnap=await db.ref('tasks').orderByChild('prop').equalTo(id).once('value');
      if(tSnap.exists()){for(const tid of Object.keys(tSnap.val()))await db.ref('tasks/'+tid).remove()}
      continue;
    }
    if(p.name==='@marugame'&&!p.icalUrl){
      await db.ref('properties/'+id+'/icalUrl').set('https://www.airbnb.jp/calendar/ical/1435367472357209402.ics?t=3f1cb3b5d4ea4419b981b3970dea4fc4');
    }
  }
  listen();
  setTimeout(syncAirbnb,1500);
}
boot();
</script>
