<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CleanBoard - 清掃管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f5f5f5;--text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e8e8e8;--primary:#4a7aed;--primary-light:#eef3ff;--danger:#e85454;
  --accent:#f0836b;--shadow:0 1px 4px rgba(0,0,0,.06);--radius:12px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding-bottom:calc(60px + var(--safe-bottom))}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:.875rem;border:none;border-radius:var(--radius);padding:.5rem 1rem;transition:all .15s}
button:active{transform:scale(.97)}
input,select,textarea{font-family:inherit;font-size:.9rem;border:1px solid var(--border);border-radius:var(--radius);padding:.6rem .75rem;background:var(--surface);color:var(--text);width:100%}
textarea{resize:vertical;min-height:60px}

/* ===== Bottom Tab Bar ===== */
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bottom);height:calc(60px + var(--safe-bottom))}
.bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:.4rem 0;background:transparent;color:var(--text3);font-size:.65rem;font-weight:500;border-radius:0;position:relative}
.bottom-tab i{font-size:1.3rem;line-height:1}
.bottom-tab.active{color:var(--primary)}
.bottom-tab.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--primary);border-radius:0 0 2px 2px}
.bottom-tab.special{color:var(--accent)}
.bottom-tab.special i{font-size:1.1rem;background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* ===== Main Content ===== */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== Calendar Header ===== */
.cal-header{display:flex;align-items:center;justify-content:center;padding:.75rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:.5rem}
.cal-header h2{font-size:1.1rem;font-weight:700;min-width:120px;text-align:center}
.cal-nav-btn{background:var(--surface2);color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:1rem}
.cal-today-btn{background:var(--surface2);color:var(--text);padding:.4rem .85rem;font-size:.8rem;font-weight:600;border-radius:20px}
.cal-today-btn:active{background:var(--border)}

/* ===== Day List Calendar ===== */
.day-list{padding:0}
.day-row{display:flex;align-items:stretch;min-height:60px;border-bottom:1px solid var(--border);background:var(--surface)}
.day-row.alt{background:#f5f5f7}
.day-label{width:48px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;font-weight:700;color:#fff;position:relative;background:transparent;border-right:none;margin:.4rem .3rem .4rem .4rem}
.day-label-inner{background:var(--primary);border-radius:10px;width:44px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.day-label .day-num{font-size:1.2rem;line-height:1.1}
.day-label .day-dow{font-size:.65rem;font-weight:600;margin-top:1px}
.day-row.today{background:#dce8ff!important;border-left:3px solid var(--primary)}
.day-row.today .day-label-inner{background:#2a5cc7;box-shadow:0 2px 8px rgba(42,92,199,.4)}
.day-content{flex:1;padding:.5rem .75rem;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:.4rem}

/* ===== Checkout Card (in day list) ===== */
.co-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.45rem .65rem;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s,box-shadow .15s;position:relative;display:inline-block}
.co-card:active{transform:scale(.98);box-shadow:0 1px 2px rgba(0,0,0,.1)}
.co-card-title{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:.25rem}
.co-card-name{font-weight:700;font-size:.85rem;color:var(--text)}
.co-card-alert{color:var(--danger);font-size:.95rem}
.co-card-info{display:flex;flex-direction:column;gap:.1rem;font-size:.75rem;color:var(--text2)}
.co-card-info-item{display:flex;align-items:center;justify-content:space-between;gap:.3rem}
.co-card-info-item .label{color:var(--text2);font-weight:700;font-size:.72rem}
.co-card-info-item .value{background:var(--surface2);padding:.15rem .5rem;border-radius:5px;font-weight:700;font-size:.75rem;border:1px solid var(--border);margin-left:auto}

/* ===== Task chip ===== */
.task-chip-mini{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:500}
.task-chip-mini.done{opacity:.5;text-decoration:line-through}

/* ===== Floating Action Buttons ===== */
.fab-container{position:fixed;bottom:calc(72px + var(--safe-bottom));right:16px;display:flex;flex-direction:column;gap:10px;z-index:90}
.fab{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.15);padding:0;font-size:1.3rem}
.fab:active{transform:scale(.93)}
.fab-filter{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.fab-add{background:var(--primary);color:#fff;flex-direction:column;gap:1px;font-size:.6rem;font-weight:700;width:56px;height:56px}
.fab-add i{font-size:1.2rem}
.fab-sync{background:var(--surface);color:var(--text2);border:1px solid var(--border);width:44px;height:44px;font-size:1rem}
.fab-sync.syncing{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ===== Filter Drawer ===== */
.filter-drawer{position:fixed;bottom:calc(60px + var(--safe-bottom));left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:1rem;z-index:95;transform:translateY(100%);transition:transform .25s ease;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.filter-drawer.open{transform:translateY(0)}
.filter-drawer h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:.5rem}
.filter-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.filter-chip{padding:.4rem .75rem;border-radius:20px;font-size:.8rem;font-weight:500;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-chip .fdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.3rem}

/* ===== Task List ===== */
.task-section{padding:1rem}
.task-filters{display:flex;gap:.35rem;margin-bottom:1rem}
.task-filter{padding:.4rem .8rem;border-radius:20px;background:var(--surface2);color:var(--text2);font-size:.8rem;font-weight:500;border:1px solid var(--border)}
.task-filter.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.task-list{display:flex;flex-direction:column;gap:.5rem}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;display:flex;align-items:flex-start;gap:.75rem;box-shadow:var(--shadow)}
.task-card.done{opacity:.55}
.task-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.task-check.checked{background:var(--primary);border-color:var(--primary);color:#fff}
.task-info{flex:1;min-width:0}
.task-prop{font-weight:600;font-size:.9rem}
.task-meta{font-size:.78rem;color:var(--text2);margin-top:.15rem}
.task-note{font-size:.78rem;color:var(--text2);margin-top:.25rem;font-style:italic}
.task-delete{background:transparent;color:var(--text3);padding:.3rem;font-size:1rem}
.task-delete:hover{color:var(--danger)}
.task-prop-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.35rem;vertical-align:middle}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}

/* ===== Checklist ===== */
.checklist-section{padding:1rem}
.cl-select{max-width:100%;margin-bottom:1rem;border-radius:var(--radius)}
.cl-room{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.cl-room-header{padding:.6rem .85rem;font-weight:600;font-size:.9rem;background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.cl-room-progress{font-size:.75rem;color:var(--text2);font-weight:400}
.cl-items{padding:.5rem .85rem}
.cl-item{display:flex;align-items:center;gap:.5rem;padding:.35rem 0;font-size:.875rem;cursor:pointer}
.cl-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary)}
.cl-edit-item{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;font-size:.85rem}
.cl-edit-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary)}
.cl-edit-item.disabled{opacity:.4;text-decoration:line-through}
.cl-add-item{display:flex;gap:.4rem;margin-top:.4rem;padding:.3rem 0}
.cl-add-item input{flex:1;font-size:.82rem;padding:.35rem .5rem}
.cl-add-item button{padding:.35rem .6rem;font-size:.78rem;background:var(--primary);color:#fff}
.cl-add-room{margin-top:.75rem}
.cl-add-room input{font-size:.82rem;padding:.35rem .5rem}
.cl-edit-del{background:transparent;color:var(--text3);padding:.2rem;font-size:.9rem;margin-left:auto}
.cl-edit-del:active{color:var(--danger)}
.cl-progress-all{margin-top:.5rem}
.progress-bar-bg{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:.35rem}
.progress-bar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .3s}
.progress-label{font-size:.75rem;color:var(--text2);margin-top:.25rem}

/* ===== Stats ===== */
.stats-section{padding:1rem}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:var(--shadow)}
.stat-value{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-label{font-size:.75rem;color:var(--text2);margin-top:.2rem}
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.chart-section h3{font-size:.9rem;margin-bottom:.75rem}
.bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;font-size:.8rem}
.bar-name{width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .3s;display:flex;align-items:center;padding-left:6px;font-size:.7rem;color:#fff;font-weight:600;min-width:fit-content}
.bar-count{width:30px;flex-shrink:0;text-align:center;font-weight:600}

/* ===== Settings ===== */
.settings-section-wrap{padding:1rem}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.settings-section h3{font-size:.95rem;margin-bottom:.75rem}
.setting-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;font-size:.875rem}
.setting-row .filter-dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
.setting-row span{flex:1}
.btn-sm{padding:.35rem .65rem;font-size:.78rem;border-radius:var(--radius)}
.btn-danger{background:var(--danger);color:#fff}
.btn-primary{background:var(--primary);color:#fff}
.add-row{display:flex;gap:.5rem;margin-top:.5rem}
.add-row input{flex:1}
.color-input{width:50px!important;padding:2px!important;height:36px;cursor:pointer;border-radius:8px}
.ical-input{font-size:.78rem;padding:.4rem .55rem}
.staff-role{font-size:.65rem;padding:.15rem .4rem;border-radius:4px;background:#ffeeba;color:#856404;font-weight:600;margin-left:.3rem}
.btn-role{padding:.25rem .5rem;font-size:.68rem;border-radius:6px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-role.is-admin{background:#ffeeba;color:#856404;border-color:#ffc107}

/* ===== Notification Bell ===== */
.notif-bell{position:relative;background:transparent;color:var(--text3);font-size:1.3rem;padding:.3rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.notif-badge{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;font-size:.55rem;font-weight:700;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.notif-list{padding:1rem}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;margin-bottom:.5rem;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:.6rem}
.notif-item.unread{border-left:3px solid var(--primary);background:var(--primary-light)}
.notif-icon{font-size:1.1rem;color:var(--primary);flex-shrink:0;margin-top:2px}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:.85rem;font-weight:600}
.notif-meta{font-size:.72rem;color:var(--text3);margin-top:.15rem}
.notif-empty{text-align:center;padding:3rem 1rem;color:var(--text3)}

/* ===== Modals ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:200}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-width:500px;box-shadow:0 -4px 30px rgba(0,0,0,.15);max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .75rem}
.modal h2{font-size:1.05rem;margin-bottom:1rem}
.modal-field{margin-bottom:.85rem}
.modal-field label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:.3rem}
.modal-actions{display:flex;gap:.5rem;margin-top:1.2rem}
.modal-actions button{flex:1;padding:.7rem;font-size:.9rem;font-weight:600}
.btn-cancel{background:var(--surface2);color:var(--text)}

/* ===== Detail Modal ===== */
.detail-modal{max-height:90vh}
.detail-header{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
.detail-header .prop-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border-radius:99px;font-weight:700;font-size:.9rem}
.detail-header .close-btn{margin-left:auto;background:transparent;color:var(--text2);font-size:1.3rem;padding:.2rem .5rem}
.detail-timeline{position:relative;padding-left:28px;margin-bottom:1.2rem}
.detail-timeline::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:1rem}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-22px;top:2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--surface)}
.tl-dot.checkout{border-color:#FF5A5F;background:#fde8e8}
.tl-dot.clean{border-color:var(--primary);background:var(--primary-light)}
.tl-dot.checkin{border-color:#2e7d32;background:#e8f5e9}
.tl-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.15rem}
.tl-label.checkout{color:#c0392b}
.tl-label.clean{color:var(--primary)}
.tl-label.checkin{color:#2e7d32}
.tl-value{font-size:.9rem;font-weight:600}
.tl-sub{font-size:.78rem;color:var(--text2)}
.detail-fields{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem}
.detail-field{display:flex;flex-direction:column;gap:.25rem}
.detail-field label{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:.3rem}
.detail-field input,.detail-field select{font-size:.88rem;padding:.5rem .65rem}

/* ===== Desktop overrides ===== */
@media(min-width:769px){
  body{max-width:500px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.08);position:relative}
  .bottom-tabs{max-width:500px;left:50%;transform:translateX(-50%)}
  .filter-drawer{max-width:500px;left:50%;transform:translateX(-50%) translateY(100%)}
  .filter-drawer.open{transform:translateX(-50%) translateY(0)}
  .fab-container{right:calc(50% - 234px)}
}
</style>
</head>
<body>

<main class="content">
  <!-- Calendar -->
  <div class="tab-content active" id="tab-calendar">
    <div class="cal-header">
      <button class="cal-nav-btn" id="calPrev"><i class="ti ti-chevron-left"></i></button>
      <h2 id="calTitle"></h2>
      <button class="cal-nav-btn" id="calNext"><i class="ti ti-chevron-right"></i></button>
      <button class="cal-today-btn" id="calToday">今日へ</button>
    </div>
    <div class="day-list" id="dayList"></div>
  </div>

  <!-- Tasks -->
  <div class="tab-content" id="tab-tasks">
    <div class="task-section">
      <div class="task-filters">
        <button class="task-filter active" data-filter="all">すべて</button>
        <button class="task-filter" data-filter="undone">未完了</button>
        <button class="task-filter" data-filter="done">完了済み</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
  </div>

  <!-- Checklist -->
  <div class="tab-content" id="tab-checklist">
    <div class="checklist-section">
      <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem">
        <select class="cl-select" id="clPropSelect" style="flex:1;margin-bottom:0"></select>
        <button class="btn-cl-edit" id="btnClEdit" style="background:var(--surface2);color:var(--text2);padding:.5rem .75rem;font-size:.8rem;white-space:nowrap;border:1px solid var(--border)"><i class="ti ti-pencil"></i> 編集</button>
      </div>
      <div id="clRooms"></div>
      <div class="cl-progress-all">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="clProgressFill" style="width:0%"></div></div>
        <div class="progress-label" id="clProgressLabel">0 / 0 項目完了</div>
      </div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="tab-content" id="tab-notifications">
    <div class="notif-list" id="notifList"></div>
  </div>

  <!-- Stats -->
  <div class="tab-content" id="tab-stats">
    <div class="stats-section">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-section"><h3>スタッフ別 完了件数</h3><div id="chartStaff"></div></div>
      <div class="chart-section"><h3>物件別 タスク件数</h3><div id="chartProp"></div></div>
    </div>
  </div>

  <!-- Settings -->
  <div class="tab-content" id="tab-settings">
    <div class="settings-section-wrap">
      <div class="settings-section">
        <h3><i class="ti ti-building"></i> 物件管理</h3>
        <div id="settingsProps"></div>
        <div class="add-row">
          <input id="newPropName" placeholder="物件名">
          <input type="color" id="newPropColor" value="#4a7aed" class="color-input">
          <button class="btn-sm btn-primary" id="btnAddProp">追加</button>
        </div>
      </div>
      <div class="settings-section">
        <h3><i class="ti ti-brand-airbnb"></i> Airbnb iCal連携</h3>
        <p style="font-size:.78rem;color:var(--text2);margin-bottom:.75rem">物件ごとにAirbnbのiCalフィードURLを設定すると、予約情報がカレンダーに自動表示されます。</p>
        <div id="settingsIcal"></div>
      </div>
      <div class="settings-section">
        <h3><i class="ti ti-users"></i> スタッフ管理</h3>
        <div id="settingsStaff"></div>
        <div class="add-row">
          <input id="newStaffName" placeholder="スタッフ名">
          <button class="btn-sm btn-primary" id="btnAddStaff">追加</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Filter Drawer -->
<div class="filter-drawer" id="filterDrawer">
  <h3>物件フィルター</h3>
  <div class="filter-chips" id="filterChips"></div>
</div>

<!-- FABs -->
<div class="fab-container" id="fabContainer">
  <button class="fab fab-sync" id="btnSync" title="Airbnb同期"><i class="ti ti-refresh"></i></button>
  <button class="fab fab-filter" id="fabFilter" title="フィルター"><i class="ti ti-filter"></i></button>
  <button class="fab fab-add" id="btnAddTask"><i class="ti ti-calendar-plus"></i>新規追加</button>
</div>

<!-- Bottom Tab Bar -->
<nav class="bottom-tabs">
  <button class="bottom-tab active" data-tab="calendar"><i class="ti ti-calendar"></i>カレンダー</button>
  <button class="bottom-tab" data-tab="tasks"><i class="ti ti-list-check"></i>タスク</button>
  <button class="bottom-tab" data-tab="notifications" style="position:relative"><i class="ti ti-bell"></i>通知<span class="notif-badge" id="notifBadge" style="display:none">0</span></button>
  <button class="bottom-tab" data-tab="checklist"><i class="ti ti-checkbox"></i>チェック</button>
  <button class="bottom-tab special" data-tab="settings"><i class="ti ti-settings"></i>その他</button>

<!-- Add Task Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2><i class="ti ti-plus"></i> タスク追加</h2>
    <div class="modal-field">
      <label>物件</label>
      <select id="modalProp"></select>
    </div>
    <div class="modal-field">
      <label>日付</label>
      <input type="date" id="modalDate">
    </div>
    <div class="modal-field">
      <label>担当スタッフ</label>
      <select id="modalStaff"></select>
    </div>
    <div class="modal-field">
      <label>備考</label>
      <textarea id="modalNote" placeholder="清掃に関するメモ..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnModalCancel">キャンセル</button>
      <button class="btn-primary" id="btnModalSave">追加</button>
    </div>
  </div>
</div>

<!-- Confirm Done Modal -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2><i class="ti ti-circle-check" style="color:var(--primary)"></i> 清掃完了の確認</h2>
    <div style="background:var(--primary-light);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem">
        <i class="ti ti-building" style="color:var(--primary);font-size:1rem"></i>
        <span style="font-weight:700;font-size:.95rem" id="confirmProp"></span>
      </div>
      <div style="display:flex;gap:1.2rem;font-size:.82rem;color:var(--text2)">
        <span><i class="ti ti-calendar"></i> <span id="confirmDate"></span></span>
        <span><i class="ti ti-user"></i> <span id="confirmStaff"></span></span>
      </div>
    </div>
    <div class="modal-field">
      <label>メモ（任意）</label>
      <textarea id="confirmNote" placeholder="管理者への伝達事項があれば入力..." style="min-height:50px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('confirmOverlay').classList.remove('show');pendingDoneId=null">キャンセル</button>
      <button class="btn-primary" onclick="submitDone()"><i class="ti ti-send"></i> 送信</button>
    </div>
  </div>
</div>

      <div class="detail-field">

        <label><i class="ti ti-clock"></i> 清掃予定時刻</label>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBzQmm4IU31ZYTgJm818DpGwLiJkqzNMiE",
  authDomain:"cleanbnb-337a1.firebaseapp.com",
  databaseURL:"https://cleanbnb-337a1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"cleanbnb-337a1",
  storageBucket:"cleanbnb-337a1.firebasestorage.app",
  messagingSenderId:"718699618691",
  appId:"1:718699618691:web:775ccc2734bd7a60e296b6"
});

const db = firebase.database();
const ICAL_PROXY = 'https://cleanboard-proxy.cleanboard-proxy.workers.dev';
let properties = {}, staff = {}, tasks = {}, checklist = {};
let airbnbEvents = {};
let notifications = {};
let activeFilter = 'all', activePropFilter = null;
let calYear, calMonth;
let filterOpen = false;

const ROOMS = [
  {name:'リビング', items:['床の掃除機がけ','テーブル拭き','ソファ整頓','ゴミ箱交換','窓拭き']},
  {name:'キッチン', items:['シンク清掃','コンロ清掃','冷蔵庫チェック','食器確認','ゴミ分別']},
  {name:'バスルーム', items:['浴槽清掃','トイレ清掃','洗面台拭き','鏡磨き','アメニティ補充']},
  {name:'寝室', items:['シーツ交換','枕カバー交換','床清掃','クローゼット確認','エアコンフィルター']}
];

const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

// Connection - no visible indicator in new design, just track state
let isOnline = false;
const connRef = db.ref('.info/connected');
connRef.on('value', snap => { isOnline = !!snap.val(); });

// Init default data
async function initDefaults(){
  const pSnap = await db.ref('properties').once('value');
  if(!pSnap.exists()){
    await db.ref('properties').push({name:'@marugame',color:'#4a7aed',bgColor:'#eef3ff'});
  }
  const sSnap = await db.ref('staff').once('value');
  if(!sSnap.exists()){
    for(const n of ['田中さん','山田さん','佐藤さん']){
      await db.ref('staff').push({name:n});
    }
  }
  const cleaned = await db.ref('_sampleCleaned').once('value');
  if(!cleaned.exists()){
    const tSnap = await db.ref('tasks').once('value');
    if(tSnap.exists()){
      for(const[tid,t] of Object.entries(tSnap.val())){
        if(t.source!=='airbnb')await db.ref('tasks/'+tid).remove();
      }
    }
    await db.ref('_sampleCleaned').set(true);
  }
}

// Listen
function listen(){
  db.ref('properties').on('value', snap=>{ properties=snap.val()||{}; render(); });
  db.ref('staff').on('value', snap=>{ staff=snap.val()||{}; render(); });
  db.ref('tasks').on('value', snap=>{ tasks=snap.val()||{}; render(); });
  db.ref('checklist').on('value', snap=>{ checklist=snap.val()||{}; renderChecklist(); });
  db.ref('notifications').orderByChild('timestamp').limitToLast(50).on('value', snap=>{ notifications=snap.val()||{}; renderNotifications(); });
}

function render(){
  renderCalendar();
  renderTasks();
  renderChecklist();
  renderStats();
  renderSettings();
  renderModalSelects();
  renderFilterChips();
}

// Filter chips
function renderFilterChips(){
  let html='<button class="filter-chip'+(activePropFilter===null?' active':'')+'" onclick="setPropFilter(null)">すべて</button>';
  for(const[id,p] of Object.entries(properties)){
    html+=`<button class="filter-chip${activePropFilter===id?' active':''}" onclick="setPropFilter('${id}')"><span class="fdot" style="background:${p.color}"></span>${esc(p.name)}</button>`;
  }
  document.getElementById('filterChips').innerHTML=html;
}

function setPropFilter(id){
  activePropFilter=id;
  render();
  toggleFilter(false);
}

// Calendar - Day List
function renderCalendar(){
  document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const dows=['日','月','火','水','木','金','土'];
  let html='';
  let todayIdx = -1;

  for(let d=1;d<=lastDay;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const dow=new Date(calYear,calMonth,d).getDay();
    const dowName=dows[dow];
    const isAlt=d%2===0;

    if(isToday) todayIdx = d;

    // Get events for this day
    const abEvents=(airbnbEvents[dateStr]||[]).filter(b=>activePropFilter===null||b.propId===activePropFilter);
    const dayTasks=Object.values(tasks).filter(t=>t.date===dateStr&&(activePropFilter===null||t.prop===activePropFilter));

    let contentHtml='';

    // Checkout cards only (no checkin/stay)
    const checkouts=abEvents.filter(b=>b.type==='checkout');
    for(const co of checkouts){
      const p=properties[co.propId];
      if(!p)continue;
      const coKey=co.propId+'_'+co.date;
      let nextHtml='';
      if(co.nextIn){
        nextHtml=`<div class="co-card-info-item"><span class="label">NEXT IN</span><span class="value">${co.nextIn.date.slice(5).replace('-','/')} 16:00</span></div>`;
      }
      contentHtml+=`<div class="co-card" onclick="openDetail('${esc(coKey)}','${esc(co.propId)}','${esc(co.date)}')">
        <div class="co-card-title"><span class="co-card-name">${esc(p.name)}</span><i class="ti ti-alert-circle co-card-alert"></i></div>
        <div class="co-card-info">
          <div class="co-card-info-item"><span class="label">OUT</span><span class="value">${dateStr.slice(5).replace('-','/')} 11:00</span></div>
          ${nextHtml}
        </div>
      </div>`;
    }

    // Task chips (non-airbnb only)
    for(const t of dayTasks){
      if(t.source==='airbnb')continue;
      const p=properties[t.prop];
      if(!p)continue;
      const s=staff[t.staff];
      contentHtml+=`<span class="task-chip-mini${t.done?' done':''}" style="background:${p.bgColor||'#eee'};color:${p.color}"><i class="ti ti-${t.done?'circle-check':'spray'}" style="font-size:.8rem"></i> ${s?esc(s.name):''}</span>`;
    }

    html+=`<div class="day-row${isToday?' today':''}${isAlt?' alt':''}" data-day="${d}">
      <div class="day-label"><div class="day-label-inner"><span class="day-num">${d}</span><span class="day-dow">(${dowName})</span></div></div>
      <div class="day-content">${contentHtml}</div>
    </div>`;
  }
  document.getElementById('dayList').innerHTML=html;

  // Scroll to today on first render
  if(todayIdx>0 && today.getFullYear()===calYear && today.getMonth()===calMonth){
    requestAnimationFrame(()=>{
      const todayRow=document.querySelector('.day-row.today');
      if(todayRow)todayRow.scrollIntoView({block:'center',behavior:'auto'});
    });
  }
}

document.getElementById('calPrev').onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()};
document.getElementById('calNext').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()};
document.getElementById('calToday').onclick=()=>{calYear=now.getFullYear();calMonth=now.getMonth();renderCalendar()};

// Tasks
function renderTasks(){
  const filtered=Object.entries(tasks).filter(([,t])=>{
    if(activePropFilter&&t.prop!==activePropFilter)return false;
    if(activeFilter==='done')return t.done;
    if(activeFilter==='undone')return!t.done;
    return true;
  }).sort((a,b)=>a[1].date.localeCompare(b[1].date));

  if(!filtered.length){
    document.getElementById('taskList').innerHTML='<div class="empty-state"><i class="ti ti-clipboard-off" style="font-size:2rem"></i><p>タスクがありません</p></div>';
    return;
  }
  document.getElementById('taskList').innerHTML=filtered.map(([id,t])=>{
    const p=properties[t.prop];
    const s=staff[t.staff];
    return`<div class="task-card${t.done?' done':''}">
      <div class="task-check${t.done?' checked':''}" onclick="toggleTask('${id}')"><i class="ti ti-check" style="font-size:.8rem;${t.done?'':'visibility:hidden'}"></i></div>
      <div class="task-info">
        <div class="task-prop"><span class="task-prop-dot" style="background:${p?p.color:'#888'}"></span>${p?esc(p.name):'不明'}</div>
        <div class="task-meta"><i class="ti ti-calendar-event"></i> ${t.date} &nbsp; <i class="ti ti-user"></i> ${s?esc(s.name):'未割当'}${t.source==='airbnb'?' &nbsp;<span style="background:#FF5A5F;color:#fff;padding:1px 5px;border-radius:3px;font-size:.65rem">Airbnb</span>':''}</div>
        ${t.note?`<div class="task-note">${esc(t.note)}</div>`:''}
      </div>
      <button class="task-delete" onclick="deleteTask('${id}')"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}

function toggleTask(id){
  const t=tasks[id];
  if(!t)return;
  if(t.done){
    // Uncheck - just toggle, no confirmation needed
    db.ref('tasks/'+id+'/done').set(false);
    return;
  }
  // Check - show confirm modal
  showConfirmDone(id);
}

let pendingDoneId=null;
function showConfirmDone(id){
  pendingDoneId=id;
  const t=tasks[id];
  const s=staff[t.staff];
  const p=properties[t.prop];
  document.getElementById('confirmProp').textContent=p?p.name:'不明';
  document.getElementById('confirmDate').textContent=t.date;
  document.getElementById('confirmStaff').textContent=s?s.name:'未割当';
  document.getElementById('confirmNote').value='';
  document.getElementById('confirmOverlay').classList.add('show');
}

function submitDone(){
  if(!pendingDoneId)return;
  const id=pendingDoneId;
  const t=tasks[id];
  const s=staff[t.staff];
  const p=properties[t.prop];
  const note=document.getElementById('confirmNote').value.trim();
  // Mark as done
  db.ref('tasks/'+id+'/done').set(true);
  // Create notification
  db.ref('notifications').push({
    type:'task_done',
    taskId:id,
    staffName:s?s.name:'不明',
    propName:p?p.name:'不明',
    date:t.date,
    note:note||t.note||'',
    timestamp:Date.now(),
    read:false
  });
  document.getElementById('confirmOverlay').classList.remove('show');
  pendingDoneId=null;
}
function deleteTask(id){if(confirm('このタスクを削除しますか？'))db.ref('tasks/'+id).remove()}

document.querySelectorAll('.task-filter').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.task-filter').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    activeFilter=b.dataset.filter;
    renderTasks();
  };
});

// Checklist
let clEditMode=false;
let clTemplates={};
db.ref('checklistTemplates').on('value',snap=>{clTemplates=snap.val()||{};renderChecklist()});

function getTemplate(propId){
  if(clTemplates[propId])return clTemplates[propId];
  return ROOMS.map(r=>({name:r.name,items:r.items.slice()}));
}

function saveTemplate(propId,tmpl){
  db.ref('checklistTemplates/'+propId).set(tmpl);
}

function renderChecklist(){
  const sel=document.getElementById('clPropSelect');
  const prev=sel.value;
  sel.innerHTML=Object.entries(properties).map(([id,p])=>`<option value="${id}">${esc(p.name)}</option>`).join('');
  if(prev&&properties[prev])sel.value=prev;
  const propId=sel.value;
  if(!propId){document.getElementById('clRooms').innerHTML='<div class="empty-state">物件を選択してください</div>';return}

  const btn=document.getElementById('btnClEdit');
  btn.innerHTML=clEditMode?'<i class="ti ti-check"></i> 完了':'<i class="ti ti-pencil"></i> 編集';
  btn.style.background=clEditMode?'var(--primary)':'var(--surface2)';
  btn.style.color=clEditMode?'#fff':'var(--text2)';

  const tmpl=getTemplate(propId);

  if(clEditMode){
    renderChecklistEdit(propId,tmpl);
    return;
  }

  const propCl=checklist[propId]||{};
  let totalItems=0,checkedItems=0;
  let html=tmpl.map((room,ri)=>{
    const roomData=propCl[ri]||{};
    const activeItems=room.items||[];
    const roomChecked=activeItems.filter((_,ii)=>roomData[ii]&&roomData[ii].checked).length;
    totalItems+=activeItems.length;
    checkedItems+=roomChecked;
    const roomPct=activeItems.length?Math.round(roomChecked/activeItems.length*100):0;
    return`<div class="cl-room">
      <div class="cl-room-header">${esc(room.name)}<span class="cl-room-progress">${roomChecked}/${activeItems.length} (${roomPct}%)</span></div>
      <div class="cl-items">${activeItems.map((item,ii)=>`<label class="cl-item"><input type="checkbox" ${roomData[ii]&&roomData[ii].checked?'checked':''} onchange="toggleCl('${propId}',${ri},${ii},this.checked)"> ${esc(item)}</label>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('clRooms').innerHTML=html;
  const pct=totalItems?Math.round(checkedItems/totalItems*100):0;
  document.getElementById('clProgressFill').style.width=pct+'%';
  document.getElementById('clProgressLabel').textContent=`${checkedItems} / ${totalItems} 項目完了 (${pct}%)`;
}

function renderChecklistEdit(propId,tmpl){
  let html=tmpl.map((room,ri)=>{
    return`<div class="cl-room">
      <div class="cl-room-header">${esc(room.name)}<button class="cl-edit-del" onclick="clDeleteRoom('${propId}',${ri})"><i class="ti ti-trash"></i></button></div>
      <div class="cl-items">
        ${(room.items||[]).map((item,ii)=>`<div class="cl-edit-item"><span style="flex:1">${esc(item)}</span><button class="cl-edit-del" onclick="clDeleteItem('${propId}',${ri},${ii})"><i class="ti ti-x"></i></button></div>`).join('')}
        <div class="cl-add-item"><input id="clNewItem_${ri}" placeholder="項目を追加..."><button onclick="clAddItem('${propId}',${ri})"><i class="ti ti-plus"></i></button></div>
      </div>
    </div>`;
  }).join('');
  html+=`<div class="cl-add-room"><div class="add-row"><input id="clNewRoom" placeholder="部屋を追加..."><button class="btn-sm btn-primary" onclick="clAddRoom('${propId}')"><i class="ti ti-plus"></i> 追加</button></div></div>`;
  document.getElementById('clRooms').innerHTML=html;
  document.getElementById('clProgressFill').style.width='0%';
  document.getElementById('clProgressLabel').textContent='編集モード';
}

function clAddItem(propId,ri){
  const input=document.getElementById('clNewItem_'+ri);
  const val=input.value.trim();
  if(!val)return;
  const tmpl=getTemplate(propId);
  if(!tmpl[ri].items)tmpl[ri].items=[];
  tmpl[ri].items.push(val);
  saveTemplate(propId,tmpl);
  input.value='';
}

function clDeleteItem(propId,ri,ii){
  const tmpl=getTemplate(propId);
  tmpl[ri].items.splice(ii,1);
  saveTemplate(propId,tmpl);
}

function clAddRoom(propId){
  const input=document.getElementById('clNewRoom');
  const val=input.value.trim();
  if(!val)return;
  const tmpl=getTemplate(propId);
  tmpl.push({name:val,items:[]});
  saveTemplate(propId,tmpl);
  input.value='';
}

function clDeleteRoom(propId,ri){
  if(!confirm(getTemplate(propId)[ri].name+'を削除しますか？'))return;
  const tmpl=getTemplate(propId);
  tmpl.splice(ri,1);
  saveTemplate(propId,tmpl);
}

document.getElementById('clPropSelect').onchange=()=>{clEditMode=false;renderChecklist()};
document.getElementById('btnClEdit').onclick=()=>{clEditMode=!clEditMode;renderChecklist()};
function toggleCl(propId,ri,ii,val){db.ref(`checklist/${propId}/${ri}/${ii}/checked`).set(val)}

// Stats
function renderStats(){
  const y=now.getFullYear(),m=now.getMonth();
  const monthTasks=Object.values(tasks).filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m});
  const done=monthTasks.filter(t=>t.done).length;
  const total=monthTasks.length;
  const pct=total?Math.round(done/total*100):0;
  const activeStaff=new Set(monthTasks.map(t=>t.staff)).size;

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">今月のタスク</div></div>
    <div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">完了率</div></div>
    <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">完了件数</div></div>
    <div class="stat-card"><div class="stat-value">${activeStaff}</div><div class="stat-label">稼働スタッフ</div></div>`;

  const staffCounts={};
  for(const s of Object.keys(staff))staffCounts[s]=0;
  monthTasks.filter(t=>t.done).forEach(t=>{if(staffCounts[t.staff]!==undefined)staffCounts[t.staff]++});
  const maxStaff=Math.max(1,...Object.values(staffCounts));
  document.getElementById('chartStaff').innerHTML=Object.entries(staffCounts).map(([id,c])=>{
    const s=staff[id];if(!s)return'';
    const w=Math.round(c/maxStaff*100);
    return`<div class="bar-row"><span class="bar-name">${esc(s.name)}</span><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:var(--primary)">${c}</div></div><span class="bar-count">${c}</span></div>`;
  }).join('');

  const propCounts={};
  for(const p of Object.keys(properties))propCounts[p]=0;
  monthTasks.forEach(t=>{if(propCounts[t.prop]!==undefined)propCounts[t.prop]++});
  const maxProp=Math.max(1,...Object.values(propCounts));
  document.getElementById('chartProp').innerHTML=Object.entries(propCounts).map(([id,c])=>{
    const p=properties[id];if(!p)return'';
    const w=Math.round(c/maxProp*100);

// Airbnb iCal
function parseICal(text){
  const events=[];
  const blocks=text.split('BEGIN:VEVENT');
  for(let i=1;i<blocks.length;i++){
    const b=blocks[i].split('END:VEVENT')[0];
    const get=k=>{const m=b.match(new RegExp(k+':(.+)'));return m?m[1].trim():''};
    const dtstart=get('DTSTART;VALUE=DATE')||get('DTSTART');
    const dtend=get('DTEND;VALUE=DATE')||get('DTEND');
    const summary=get('SUMMARY');
    const desc=get('DESCRIPTION');
    if(dtstart&&dtend){
      const start=dtstart.replace(/(\d{4})(\d{2})(\d{2}).*/,'$1-$2-$3');
      const end=dtend.replace(/(\d{4})(\d{2})(\d{2}).*/,'$1-$2-$3');
      events.push({start,end,summary,desc});
    }
  }
  return events;
}

function expandBookings(events,propId){
  const sorted=events.filter(ev=>ev.summary!=='Not available'&&ev.summary!=='Airbnb (Not available)').sort((a,b)=>a.start.localeCompare(b.start));
  const result=[];
  for(let ei=0;ei<sorted.length;ei++){
    const ev=sorted[ei];
    const s=new Date(ev.start),e=new Date(ev.end);
    const nights=Math.round((e-s)/(86400000));
    const nextEv=sorted[ei+1]||null;
    const nextIn=nextEv?{date:nextEv.start,summary:nextEv.summary,nights:Math.round((new Date(nextEv.end)-new Date(nextEv.start))/86400000)}:null;
    result.push({date:ev.start,type:'checkin',propId,summary:ev.summary,desc:ev.desc,nights});
    for(let d=1;d<nights;d++){
      const cur=new Date(s);cur.setDate(cur.getDate()+d);
      const dateStr=cur.toISOString().slice(0,10);
      result.push({date:dateStr,type:'stay',propId,summary:ev.summary,desc:ev.desc,nights});
    }
    result.push({date:ev.end,type:'checkout',propId,summary:ev.summary,desc:ev.desc,nights,nextIn});
  }
  return result;
}

async function syncAirbnb(){
  const btn=document.getElementById('btnSync');
  btn.classList.add('syncing');
  airbnbEvents={};
  let hasIcal=false;
  for(const[id,p] of Object.entries(properties)){
    if(!p.icalUrl)continue;
    hasIcal=true;
    try{
      const resp=await fetch(ICAL_PROXY+'?url='+encodeURIComponent(p.icalUrl));
      if(!resp.ok)continue;
      const text=await resp.text();
      const events=parseICal(text);
      const bookings=expandBookings(events,id);
      for(const b of bookings){
        if(!airbnbEvents[b.date])airbnbEvents[b.date]=[];
        airbnbEvents[b.date].push(b);
      }
    }catch(e){console.error('iCal sync error for '+p.name,e)}
  }
  if(hasIcal) await autoCreateCheckoutTasks();
  btn.classList.remove('syncing');
  renderCalendar();
  renderTasks();
}

async function autoCreateCheckoutTasks(){
  const existingTasks=Object.values(tasks);
  const staffIds=Object.keys(staff);
  if(!staffIds.length)return;
  let created=0;
  for(const[date,evts] of Object.entries(airbnbEvents)){
    const checkouts=evts.filter(e=>e.type==='checkout');
    for(const co of checkouts){
      const already=existingTasks.some(t=>t.prop===co.propId&&t.date===date&&t.source==='airbnb');
      if(already)continue;
      const assignee=staffIds[created%staffIds.length];
      const guest=co.summary&&co.summary!=='Reserved'?co.summary:'';
      await db.ref('tasks').push({
        prop:co.propId,date,staff:assignee,
        note:'チェックアウト清掃'+(guest?' ('+guest+')':''),
        done:false,source:'airbnb',createdAt:Date.now()
      });
      created++;
    }
  }
  if(created>0){
    const tSnap=await db.ref('tasks').once('value');
    tasks=tSnap.val()||{};
  }
}

// Notifications
function renderNotifications(){
  const entries=Object.entries(notifications).sort((a,b)=>(b[1].timestamp||0)-(a[1].timestamp||0));
  const unread=entries.filter(([,n])=>!n.read).length;
  const badge=document.getElementById('notifBadge');
  if(unread>0){
    badge.style.display='flex';
    badge.textContent=unread;
  }else{
    badge.style.display='none';
  }
  const el=document.getElementById('notifList');
  if(!el)return;
  if(!entries.length){
    el.innerHTML='<div class="notif-empty"><i class="ti ti-bell-off" style="font-size:2rem"></i><p>通知はありません</p></div>';
    return;
  }
  el.innerHTML=entries.map(([id,n])=>{
    const time=n.timestamp?new Date(n.timestamp):new Date();
    const timeStr=`${time.getMonth()+1}/${time.getDate()} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
    const icon=n.type==='task_done'?'ti-circle-check':'ti-bell';
    return`<div class="notif-item${n.read?'':' unread'}" onclick="markNotifRead('${id}')">
      <i class="ti ${icon} notif-icon"></i>
      <div class="notif-body">
        <div class="notif-title"><b>${esc(n.staffName)}</b>が<b>${esc(n.propName)}</b>の清掃を完了</div>
        <div class="notif-meta"><i class="ti ti-calendar"></i> ${n.date} &nbsp; <i class="ti ti-clock"></i> ${timeStr}${n.note?' &nbsp; '+esc(n.note):''}</div>
      </div>
    </div>`;
  }).join('');
}

function markNotifRead(id){
  db.ref('notifications/'+id+'/read').set(true);
}

function markAllNotifsRead(){
  for(const[id,n] of Object.entries(notifications)){
    if(!n.read)db.ref('notifications/'+id+'/read').set(true);
  }
}

// Boot
async function boot(){
  // 匿名ログイン（スタッフには見えない自動ログイン）。失敗しても従来通り続行する
  try {
    if (firebase.auth && !firebase.auth().currentUser) {
      await firebase.auth().signInAnonymously();
    }
  } catch(e) { console.warn('匿名ログインに失敗しました（プロバイダ未有効の可能性）:', e && e.code); }
  await initDefaults();
  const pSnap=await db.ref('properties').once('value');
  const props=pSnap.val()||{};
  for(const[id,p] of Object.entries(props)){
    if(p.name==='桜ハウス'||p.name==='高知東'){
      await db.ref('properties/'+id).remove();
      const tSnap=await db.ref('tasks').orderByChild('prop').equalTo(id).once('value');
      if(tSnap.exists()){for(const tid of Object.keys(tSnap.val()))await db.ref('tasks/'+tid).remove()}
      continue;
    }
    if(p.name==='@marugame'&&!p.icalUrl){
      await db.ref('properties/'+id+'/icalUrl').set('https://www.airbnb.jp/calendar/ical/1435367472357209402.ics?t=3f1cb3b5d4ea4419b981b3970dea4fc4');
    }
  }
  listen();
  setTimeout(syncAirbnb,1500);
}
boot();
